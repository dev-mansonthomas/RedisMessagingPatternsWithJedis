spring:
  application:
    name: redis-messaging-patterns
  
server:
  port: 8080
  servlet:
    context-path: /api

# Redis Configuration
# Docker-ready: Use environment variables for configuration
# When running in Docker, set REDIS_HOST to the Redis container name
redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  timeout: ${REDIS_TIMEOUT:2000}
  pool:
    max-total: ${REDIS_POOL_MAX_TOTAL:100}
    max-idle: ${REDIS_POOL_MAX_IDLE:50}
    min-idle: ${REDIS_POOL_MIN_IDLE:10}
    max-wait-millis: ${REDIS_POOL_MAX_WAIT:3000}
    test-on-borrow: true
    test-on-return: false
    test-while-idle: true

# DLQ Configuration
dlq:
  stream-name: ${DLQ_STREAM:mystream}
  dlq-stream-name: ${DLQ_DLQ_STREAM:mystream:dlq}
  consumer-group: ${DLQ_CONSUMER_GROUP:mygroup}
  default-consumer-name: ${DLQ_CONSUMER:worker}
  default-min-idle-ms: 100
  default-count: 100
  default-max-deliveries: 2

# LLM Chat pattern (#12) Configuration
llm:
  client: ${LLM_CLIENT:mock}                          # slice 1 supports only 'mock'
  context-size: ${LLM_CONTEXT_SIZE:20}                # most-recent turns fed back as context
  max-conversations: ${LLM_MAX_CONVERSATIONS:100}     # LRU cap on live per-cid workers
  conversation-idle-ttl-ms: ${LLM_CONV_IDLE_TTL_MS:1800000}  # reap idle conversations after 30m
  reaper-interval-ms: ${LLM_REAPER_INTERVAL_MS:60000}
  timeout-seconds: ${LLM_TIMEOUT_SECONDS:10}          # reply-timeout key TTL; expiry -> keyspace notification
  token-chart-bucket-ms: ${LLM_TOKEN_CHART_BUCKET_MS:10000}  # TS.RANGE aggregation bucket for the chart
  mock:
    token-delay-ms: ${LLM_MOCK_TOKEN_DELAY_MS:40}
  moderation:
    keywords: ${LLM_MODERATION_KEYWORDS:password,secret,ssn,credit card,api key}
  resilience:
    max-deliveries: ${LLM_MAX_DELIVERIES:2}           # reclaims beyond this -> DLQ
    min-idle-ms: ${LLM_MIN_IDLE_MS:2000}              # only reclaim pending idle longer than this (ms)
    sweep-interval-ms: ${LLM_SWEEP_INTERVAL_MS:1000}  # XAUTOCLAIM sweep cadence
    poison-prefix: ${LLM_POISON_PREFIX:/fail}         # content prefix that always fails (DLQ demo)

# Logging Configuration
logging:
  level:
    root: INFO
    com.redis.patterns: DEBUG
    redis.clients.jedis: INFO
    org.springframework.web: DEBUG
    org.springframework.web.servlet.mvc.method.annotation: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/redis-messaging-patterns.log
    max-size: 10MB
    max-history: 30

# WebSocket Configuration
websocket:
  endpoint: /ws
  allowed-origins: "*"
  message-buffer-size: 8192
  send-time-limit: 20000

# Actuator Configuration (for Docker health checks)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

